services:
  - type: web
    name: smart-grocery-api
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
